<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Ai — Team Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       LAYER 1 — PRIMITIVE TOKENS
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      /* Colours */
      --primitive-blue-500:   #3B82F6;
      --primitive-green-500:  #22C55E;
      --primitive-purple-500: #A855F7;
      --primitive-orange-500: #F97316;
      --primitive-teal-500:   #14B8A6;
      --primitive-slate-950:  #020617;
      --primitive-slate-900:  #0F172A;
      --primitive-slate-800:  #1E293B;
      --primitive-slate-700:  #334155;
      --primitive-slate-500:  #64748B;
      --primitive-slate-300:  #CBD5E1;
      --primitive-slate-100:  #F1F5F9;
      --primitive-white:      #FFFFFF;

      /* Spacing scale — 4pt base */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;

      /* Radii */
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
      --radius-full: 9999px;

      /* Typography scale */
      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;
      --text-2xl:  28px;
      --text-3xl:  36px;
    }

    /* ═══════════════════════════════════════════════════════════════════
       LAYER 2 — SEMANTIC TOKENS
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      --color-bg:             var(--primitive-slate-950);
      --color-surface:        var(--primitive-slate-900);
      --color-surface-raised: var(--primitive-slate-800);
      --color-border:         var(--primitive-slate-700);
      --color-border-subtle:  rgba(255,255,255,0.06);
      --color-text-primary:   var(--primitive-slate-100);
      --color-text-secondary: var(--primitive-slate-500);
      --color-text-muted:     rgba(255,255,255,0.35);
      --color-status-active:  var(--primitive-green-500);
      --color-status-running: var(--primitive-blue-500);
      --color-status-idle:    var(--primitive-slate-500);
    }

    /* ═══════════════════════════════════════════════════════════════════
       LAYER 3 — COMPONENT TOKENS
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      --card-bg:         var(--color-surface);
      --card-border:     var(--color-border-subtle);
      --card-radius:     var(--radius-lg);
      --card-padding:    var(--space-6);
      --badge-radius:    var(--radius-full);
      --badge-padding:   3px 10px;
      --progress-height: 6px;
      --progress-radius: var(--radius-full);
      --stat-bg:         var(--color-surface);
      --stat-border:     var(--color-border-subtle);
    }

    /* ═══════════════════════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle grid texture on background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════
       PAGE WRAPPER
       ═══════════════════════════════════════════════════════════════════ */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--space-6) 80px;
    }

    /* ═══════════════════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════════════════ */
    .site-header {
      padding: var(--space-8) 0 var(--space-8);
      border-bottom: 1px solid var(--color-border-subtle);
      margin-bottom: var(--space-8);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-6);
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .header-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--color-text-primary);
      line-height: 1.15;
    }

    .header-subtitle {
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
      padding-top: 4px;
    }

    /* Live pulse dot */
    .live-dot {
      position: relative;
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }

    .live-dot::before,
    .live-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-status-active);
    }

    .live-dot::after {
      animation: status-pulse 1.5s ease-out infinite;
    }

    @keyframes status-pulse {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--badge-radius);
      padding: var(--space-2) var(--space-4);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════════════════════════════════
       STAT CARDS (header summary row)
       ═══════════════════════════════════════════════════════════════════ */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }

    .stat-card {
      background: var(--stat-bg);
      border: 1px solid var(--stat-border);
      border-left: 3px solid var(--primitive-blue-500);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(59,130,246,0.4), transparent);
    }

    .stat-label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }

    /* ═══════════════════════════════════════════════════════════════════
       SECTION HEADING
       ═══════════════════════════════════════════════════════════════════ */
    .section-heading {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border-subtle);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--color-border-subtle), transparent);
    }

    /* ═══════════════════════════════════════════════════════════════════
       AGENT GRID
       ═══════════════════════════════════════════════════════════════════ */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-5);
    }

    /* ═══════════════════════════════════════════════════════════════════
       AGENT CARD
       ═══════════════════════════════════════════════════════════════════ */
    .agent-card {
      --agent-color: var(--primitive-blue-500);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: transform 200ms ease-out, box-shadow 200ms ease-out, border-color 200ms ease-out;
      /* Card entrance: start hidden, animate in via JS-added class */
      opacity: 0;
      transform: translateY(20px);
    }

    .agent-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Top accent strip */
    .agent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--agent-color);
      border-radius: var(--card-radius) var(--card-radius) 0 0;
      z-index: 1;
    }

    /* Per-agent colour tokens */
    .agent-card[data-agent="daryl"]  { --agent-color: #3B82F6; }
    .agent-card[data-agent="steven"] { --agent-color: #22C55E; }
    .agent-card[data-agent="cody"]   { --agent-color: #A855F7; }
    .agent-card[data-agent="debbie"] { --agent-color: #F97316; }
    .agent-card[data-agent="pat"]    { --agent-color: #14B8A6; }

    .agent-card:hover {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--agent-color) 40%, transparent);
      box-shadow:
        0 8px 32px color-mix(in srgb, var(--agent-color) 20%, transparent),
        0 2px 8px rgba(0,0,0,0.4);
    }

    /* Focus ring for keyboard navigation */
    .agent-card:focus-within {
      outline: 2px solid var(--agent-color);
      outline-offset: 2px;
    }

    /* ── Card Header ── */
    .card-header {
      padding: var(--space-5) var(--space-6) var(--space-4);
      padding-top: calc(var(--space-5) + 3px); /* account for accent strip */
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      border-bottom: 1px solid var(--color-border-subtle);
    }

    /* Avatar */
    .agent-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--agent-color);
      background: color-mix(in srgb, var(--agent-color) 15%, transparent);
      letter-spacing: 0;
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.2;
    }

    .agent-role {
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-top: 3px;
    }

    /* ── Status badges ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: var(--badge-padding);
      border-radius: var(--badge-radius);
      border: 1px solid transparent;
      flex-shrink: 0;
      line-height: 1.8;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }

    /* Active */
    .status-badge--active {
      color: var(--color-status-active);
      background: color-mix(in srgb, var(--color-status-active) 15%, transparent);
      border-color: color-mix(in srgb, var(--color-status-active) 25%, transparent);
    }
    .status-badge--active .status-dot {
      background: var(--color-status-active);
    }
    .status-badge--active .status-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-status-active);
      animation: dot-pulse 1.5s ease-out infinite;
    }

    /* Running */
    .status-badge--running {
      color: var(--color-status-running);
      background: color-mix(in srgb, var(--color-status-running) 15%, transparent);
      border-color: color-mix(in srgb, var(--color-status-running) 25%, transparent);
    }
    .status-badge--running .status-dot {
      background: var(--color-status-running);
    }
    .status-badge--running .status-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-status-running);
      animation: dot-pulse 1s ease-out infinite;
    }

    /* Idle */
    .status-badge--idle {
      color: var(--color-status-idle);
      background: color-mix(in srgb, var(--color-status-idle) 15%, transparent);
      border-color: color-mix(in srgb, var(--color-status-idle) 20%, transparent);
    }
    .status-badge--idle .status-dot {
      background: var(--color-status-idle);
    }

    @keyframes dot-pulse {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* ── Card Body ── */
    .card-body {
      padding: var(--space-5) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      flex: 1;
    }

    /* ── Section label inside card ── */
    .card-section-label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }

    /* ── Task list ── */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-sm);
      font-weight: 400;
      color: var(--primitive-slate-300);
      line-height: 1.45;
    }

    .task-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--agent-color);
    }

    /* ── Token usage section ── */
    .tokens-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .tokens-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .tokens-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 400;
      align-self: center;
    }

    .tokens-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-sm);
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-left: auto;
    }

    /* Progress bar */
    .progress-track {
      height: var(--progress-height);
      background: var(--primitive-slate-800);
      border-radius: var(--progress-radius);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: var(--progress-radius);
      background: linear-gradient(
        90deg,
        var(--agent-color) 0%,
        color-mix(in srgb, var(--agent-color) 60%, var(--primitive-white)) 100%
      );
      width: 0%;
      transition: width 300ms ease-out;
    }

    /* ═══════════════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════════════ */
    .site-footer {
      margin-top: var(--space-12);
      padding-top: var(--space-5);
      border-top: 1px solid var(--color-border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .footer-note {
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--color-text-muted);
      font-style: italic;
    }

    .footer-brand {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
    }

    /* ═══════════════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .page-wrapper {
        padding: 0 var(--space-4) 60px;
      }
      .site-header {
        flex-direction: column;
        gap: var(--space-4);
        padding: var(--space-6) 0;
      }
      .header-right {
        align-items: flex-start;
      }
      .stat-row {
        grid-template-columns: 1fr;
        gap: var(--space-3);
      }
      .stat-value {
        font-size: var(--text-2xl);
      }
      .agent-grid {
        grid-template-columns: 1fr;
        gap: var(--space-4);
      }
    }

    @media (max-width: 420px) {
      .card-header {
        flex-wrap: wrap;
      }
      .status-badge {
        margin-top: var(--space-1);
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
       REDUCED MOTION — ACCESSIBILITY
       ═══════════════════════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .agent-card {
        opacity: 1;
        transform: none;
      }
      .progress-fill {
        transition: none;
      }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ -->
  <header class="site-header" role="banner">
    <div class="header-left">
      <div class="header-eyebrow" aria-hidden="true">
        Live Operations
      </div>
      <h1 class="header-title">Project Ai — Team Dashboard</h1>
      <p class="header-subtitle">Agent Activity</p>
    </div>
    <div class="header-right">
      <div class="live-dot" aria-hidden="true" title="Live data"></div>
      <div class="date-badge" id="date-badge" aria-label="Current date">—</div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       SUMMARY STAT CARDS
       ═══════════════════════════════════════════════════════ -->
  <div class="stat-row" role="region" aria-label="Session summary">
    <div class="stat-card">
      <div class="stat-label">Total Tokens</div>
      <div class="stat-value" id="total-tokens">—</div>
      <div class="stat-meta">Across all agents</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Agents</div>
      <div class="stat-value" id="total-agents">—</div>
      <div class="stat-meta" id="total-agents-meta">Of 5 available</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tasks Completed</div>
      <div class="stat-value" id="total-tasks">—</div>
      <div class="stat-meta">This session</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       AGENT GRID
       ═══════════════════════════════════════════════════════ -->
  <main>
    <h2 class="section-heading">Agent Status</h2>

    <div class="agent-grid" id="agent-grid">
      <!-- populated by JS -->
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <p class="footer-note">Token counts are illustrative demo data. Real-time token tracking coming soon.</p>
    <p class="footer-brand">Project Ai · Team Dashboard</p>
  </footer>

</div><!-- .page-wrapper -->

<script>
  /* ─────────────────────────────────────────────────────────
     SECURITY: escape helper — applied to all innerHTML
  ───────────────────────────────────────────────────────── */
  function esc(str) {
    return String(str)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#x27;');
  }

  /* ─────────────────────────────────────────────────────────
     HELPERS
  ───────────────────────────────────────────────────────── */
  function fmt(n) {
    return n.toLocaleString('en-AU');
  }

  function initials(name) {
    return name.charAt(0).toUpperCase();
  }

  function statusLabel(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  /* ─────────────────────────────────────────────────────────
     AGENT DATA — same data as original file
  ───────────────────────────────────────────────────────── */
  const agents = [
    {
      id: 'daryl',
      name: 'Daryl',
      role: 'Project Manager',
      status: 'idle',
      tokens: 8200,
      tasks: [
        'Created team-dashboard project folder',
        'Set up assets/images directory',
        'Wrote project notes.md',
      ],
    },
    {
      id: 'steven',
      name: 'Steven',
      role: 'Web Builder',
      status: 'running',
      tokens: 31500,
      tasks: [
        'Scraped Surf Coast Suns website for content',
        'Updated hero section with new imagery',
        'Built team-dashboard index.html',
        'Moved site files into surf-coast-suns subfolder',
      ],
    },
    {
      id: 'cody',
      name: 'Cody',
      role: 'Expert Code Review',
      status: 'active',
      tokens: 14800,
      tasks: [
        'Reviewed surf-coast-suns index.html for security issues',
        'Flagged 1 warning, 3 suggestions on team-dashboard build',
      ],
    },
    {
      id: 'debbie',
      name: 'Debbie',
      role: 'Debugger',
      status: 'active',
      tokens: 6100,
      tasks: [
        'Traced and fixed broken image path after folder restructure',
      ],
    },
    {
      id: 'pat',
      name: 'Pat',
      role: 'Data Analyst',
      status: 'active',
      tokens: 9400,
      tasks: [
        'Analysed token spend across agents',
        'Generated demo data structure for dashboard',
      ],
    },
  ];

  /* ─────────────────────────────────────────────────────────
     POPULATE HEADER DATE
  ───────────────────────────────────────────────────────── */
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });
  document.getElementById('date-badge').textContent = dateStr;

  /* ─────────────────────────────────────────────────────────
     COMPUTE AGGREGATES
  ───────────────────────────────────────────────────────── */
  const totalTokens = agents.reduce((s, a) => s + a.tokens, 0);
  const totalTasks  = agents.reduce((s, a) => s + a.tasks.length, 0);
  const maxTokens   = Math.max(...agents.map(a => a.tokens));

  document.getElementById('total-tokens').textContent      = fmt(totalTokens);
  document.getElementById('total-tasks').textContent       = totalTasks;
  document.getElementById('total-agents').textContent      = agents.length;
  document.getElementById('total-agents-meta').textContent = 'Of ' + agents.length + ' available';

  /* ─────────────────────────────────────────────────────────
     CHECKMARK SVG — injected as inline SVG for colour control
  ───────────────────────────────────────────────────────── */
  function checkSVG() {
    return '<svg class="task-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="7" cy="7" r="6.5" stroke="currentColor" stroke-opacity="0.3"/><path d="M4.5 7L6.2 8.7L9.5 5.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  /* ─────────────────────────────────────────────────────────
     BUILD AGENT CARDS
  ───────────────────────────────────────────────────────── */
  const grid = document.getElementById('agent-grid');

  agents.forEach(function(agent, index) {
    const pct = Math.round((agent.tokens / maxTokens) * 100);

    const card = document.createElement('article');
    card.className = 'agent-card';
    card.dataset.agent = agent.id;
    /* Stagger delay stored as data-attr, applied during entrance animation */
    card.dataset.delay = String(index * 60);
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', esc(agent.name) + ', ' + esc(agent.role) + ', status: ' + esc(statusLabel(agent.status)));

    const taskItems = agent.tasks
      .map(function(t) {
        return '<li class="task-item">' + checkSVG() + '<span>' + esc(t) + '</span></li>';
      })
      .join('');

    card.innerHTML =
      '<div class="card-header">' +
        '<div class="agent-avatar" aria-hidden="true">' + esc(initials(agent.name)) + '</div>' +
        '<div class="agent-info">' +
          '<div class="agent-name">' + esc(agent.name) + '</div>' +
          '<div class="agent-role">' + esc(agent.role) + '</div>' +
        '</div>' +
        '<span class="status-badge status-badge--' + esc(agent.status) + '" role="status" aria-label="Status: ' + esc(statusLabel(agent.status)) + '">' +
          '<span class="status-dot" aria-hidden="true"></span>' +
          esc(statusLabel(agent.status)) +
        '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="tasks-section">' +
          '<div class="card-section-label">Tasks completed today</div>' +
          '<ul class="task-list" aria-label="Tasks for ' + esc(agent.name) + '">' +
            taskItems +
          '</ul>' +
        '</div>' +
        '<div class="tokens-section">' +
          '<div class="card-section-label">Token usage</div>' +
          '<div class="tokens-top">' +
            '<span class="tokens-count">' + esc(fmt(agent.tokens)) + '</span>' +
            '<span class="tokens-label">tokens</span>' +
            '<span class="tokens-pct">' + esc(String(pct)) + '%</span>' +
          '</div>' +
          '<div class="progress-track" role="progressbar" aria-valuenow="' + esc(String(pct)) + '" aria-valuemin="0" aria-valuemax="100" aria-label="Token usage for ' + esc(agent.name) + ': ' + esc(fmt(agent.tokens)) + ' tokens (' + esc(String(pct)) + '%)">' +
            '<div class="progress-fill" data-pct="' + esc(String(pct)) + '" style="width:0%"></div>' +
          '</div>' +
        '</div>' +
      '</div>';

    grid.appendChild(card);
  });

  /* ─────────────────────────────────────────────────────────
     ENTRANCE ANIMATION — staggered cards, then progress bars
     Respects prefers-reduced-motion via CSS
  ───────────────────────────────────────────────────────── */
  const cards = Array.from(document.querySelectorAll('.agent-card'));

  /* Check reduced-motion preference */
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (prefersReducedMotion) {
    /* Skip animation — make all visible immediately */
    cards.forEach(function(card) {
      card.classList.add('is-visible');
      card.style.transition = 'none';
    });
    /* Animate progress bars immediately */
    document.querySelectorAll('.progress-fill').forEach(function(bar) {
      bar.style.width = bar.dataset.pct + '%';
    });
  } else {
    /* Stagger card entrance: 60ms per card */
    cards.forEach(function(card, i) {
      var delay = i * 60;
      setTimeout(function() {
        card.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out';
        card.classList.add('is-visible');
      }, delay);
    });

    /* Progress bars animate after all cards have entered */
    var lastCardDelay = (cards.length - 1) * 60 + 260;
    setTimeout(function() {
      document.querySelectorAll('.progress-fill').forEach(function(bar) {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, lastCardDelay);
  }
</script>

</body>
</html>
